<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; base-uri 'none'; form-action 'none'">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Question Builder</title>
<style>
  /* ============================================================
     WARM NEUTRAL — design tokens
     ============================================================ */
  :root{
    --ink-950:#1A1714; --ink-900:#2A2622; --ink-800:#3B362F; --ink-700:#524C43;
    --ink-600:#6B6459; --ink-500:#8A8276; --ink-400:#ABA398; --ink-300:#C9C2B8;
    --ink-200:#E2DCD2; --ink-100:#EFEAE2; --ink-50:#F8F5EF;
    --paper:#FCFAF6; --white:#FFFFFF;
    --accent:#C2763C; --accent-soft:#E9D4BF;

    /* Semantic roles */
    --bg:var(--paper); --surface:var(--white);
    --text:var(--ink-900); --text-soft:var(--ink-600); --text-mute:var(--ink-500);
    --border:var(--ink-200); --border-soft:var(--ink-100);

    /* Feedback semantics — warm-harmonised, kept minimal */
    --correct:#43795A; --correct-bg:#EAF2EC; --correct-border:#BCD7C6;
    --wrong:#A8442F;   --wrong-bg:#F6E8E2;   --wrong-border:#E3C0B2;

    --font-display:'Bricolage Grotesque',ui-sans-serif,system-ui,sans-serif;
    --font-body:'Hanken Grotesk',ui-sans-serif,system-ui,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',monospace;

    --text-xs:.8125rem; --text-sm:.9375rem; --text-base:1.0625rem;
    --text-lg:1.25rem; --text-xl:1.625rem; --text-2xl:2.25rem;

    --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
    --space-6:1.5rem; --space-8:2rem; --space-12:3rem;

    --radius-sm:8px; --radius-md:12px; --radius-lg:18px; --radius-full:999px;
    --shadow-sm:0 1px 2px rgba(42,38,34,.06),0 1px 3px rgba(42,38,34,.05);
    --shadow-md:0 4px 12px rgba(42,38,34,.07),0 2px 4px rgba(42,38,34,.05);
    --shadow-lg:0 12px 32px rgba(42,38,34,.10),0 4px 8px rgba(42,38,34,.05);
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--font-body);
    font-size:var(--text-base);
    color:var(--text);
    background:var(--bg);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    padding:var(--space-8) var(--space-4) var(--space-12);
  }
  .wrap{max-width:660px;margin:0 auto}

  h1{
    font-family:var(--font-display);font-weight:700;
    font-size:var(--text-2xl);line-height:1.04;letter-spacing:-.02em;
    color:var(--ink-950);margin:0 0 var(--space-2);
  }
  .lede{color:var(--text-soft);margin:0 0 var(--space-6);font-size:var(--text-base);max-width:54ch}

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:var(--space-6);
    margin-bottom:var(--space-4);
    box-shadow:var(--shadow-sm);
  }

  label{display:block;font-family:var(--font-body);font-weight:600;font-size:var(--text-sm);margin-bottom:var(--space-2);color:var(--text)}
  .hint{font-weight:400;color:var(--text-mute);font-size:var(--text-xs)}

  textarea,input[type=text]{
    width:100%;font-family:var(--font-body);font-size:var(--text-sm);color:var(--text);
    border:1px solid var(--border);border-radius:var(--radius-md);
    padding:var(--space-3) var(--space-4);background:var(--paper);resize:vertical;
    transition:border-color .15s ease,box-shadow .15s ease;
  }
  textarea:focus,input:focus{outline:none;border-color:var(--ink-700);box-shadow:0 0 0 3px var(--ink-100)}
  textarea{min-height:54px}

  /* --- teacher: answer blocks --- */
  .opt{
    border:1px solid var(--border);border-radius:var(--radius-md);
    padding:var(--space-4);margin-bottom:var(--space-3);background:var(--surface);
  }
  .opt-head{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-3)}
  .tag{
    display:inline-flex;align-items:center;
    font-family:var(--font-body);font-weight:600;font-size:var(--text-xs);
    background:var(--accent-soft);color:var(--ink-800);
    border-radius:var(--radius-full);padding:var(--space-1) var(--space-3);flex:none;
  }
  .correct-toggle{
    display:flex;align-items:center;gap:var(--space-2);font-weight:600;
    font-size:var(--text-xs);cursor:pointer;margin-left:auto;color:var(--text-soft);
    user-select:none;
  }
  .correct-toggle input{width:20px;height:20px;accent-color:var(--correct);cursor:pointer}
  .opt textarea{min-height:42px;margin-top:var(--space-2)}
  .fb-label{font-weight:500;font-size:var(--text-xs);color:var(--text-mute);margin:var(--space-3) 0 0}

  /* --- buttons (pill) --- */
  button{font-family:var(--font-body);cursor:pointer;border-radius:var(--radius-full);border:1px solid transparent}
  .btn{
    background:var(--ink-900);color:var(--paper);font-weight:600;
    padding:var(--space-3) var(--space-6);font-size:var(--text-base);
    border-radius:var(--radius-full);
    transition:background .15s ease,transform .1s ease,border-color .15s ease,filter .15s ease;
    display:inline-flex;align-items:center;justify-content:center;text-decoration:none;
  }
  .btn:hover{background:var(--ink-950)}
  .btn:active{transform:translateY(1px)}
  .btn-ghost{background:transparent;color:var(--text);border-color:var(--border)}
  .btn-ghost:hover{background:var(--ink-50);border-color:var(--ink-300)}
  .btn:focus-visible{outline:2px solid var(--ink-900);outline-offset:2px}
  .row{display:flex;gap:var(--space-3);flex-wrap:wrap;align-items:center}

  .msg{
    border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);
    font-size:var(--text-sm);margin-top:var(--space-3);
    background:var(--wrong-bg);color:var(--wrong);border:1px solid var(--wrong-border);
  }

  /* --- share output --- */
  .share-out{margin-top:var(--space-4)}
  .share-out textarea{font-family:var(--font-mono);font-size:var(--text-xs);background:var(--ink-50);line-height:1.6}
  .share-out label{margin-top:var(--space-4)}
  .copied{color:var(--correct);font-size:var(--text-xs);font-weight:600;margin-left:var(--space-2)}

  /* --- student view --- */
  .q-stem{font-family:var(--font-display);font-size:var(--text-xl);font-weight:600;letter-spacing:-.01em;margin:0 0 var(--space-1);line-height:1.2;color:var(--ink-950)}
  .q-instruct{color:var(--text-soft);font-size:var(--text-sm);margin:0 0 var(--space-6)}
  .choice{
    display:flex;gap:var(--space-3);align-items:flex-start;
    border:1.5px solid var(--border);border-radius:var(--radius-md);
    padding:var(--space-4);margin-bottom:var(--space-3);background:var(--surface);cursor:pointer;
    transition:border-color .12s ease,background .12s ease;
  }
  .choice:hover{border-color:var(--ink-400)}
  .choice input{margin-top:3px;width:20px;height:20px;flex:none;accent-color:var(--ink-800);cursor:pointer}
  .choice .ctext{flex:1}
  .choice.locked{cursor:default}
  .choice.locked:hover{border-color:var(--border)}
  .choice.is-correct{border-color:var(--correct-border);background:var(--correct-bg)}
  .choice.is-wrong{border-color:var(--wrong-border);background:var(--wrong-bg)}
  .verdict{font-weight:700;font-size:var(--text-xs);margin-bottom:var(--space-1);display:flex;align-items:center;gap:var(--space-1)}
  .verdict.c{color:var(--correct)}
  .verdict.w{color:var(--wrong)}
  .fb{font-size:var(--text-sm);color:var(--text);margin-top:2px}
  .result{
    border-radius:var(--radius-md);padding:var(--space-4) var(--space-4);
    margin:var(--space-1) 0 var(--space-4);font-weight:600;font-size:var(--text-sm);
  }
  .result.win{background:var(--correct-bg);color:var(--correct);border:1px solid var(--correct-border)}
  .result.review{background:var(--accent-soft);color:var(--ink-800);border:1px solid #DCBE9E}

  footer{color:var(--text-mute);font-size:var(--text-xs);text-align:center;margin-top:var(--space-8)}
  a{color:var(--accent)}

  @media (max-width:480px){
    body{padding:var(--space-6) var(--space-3) var(--space-12)}
    h1{font-size:var(--text-xl)}
    .q-stem{font-size:var(--text-lg)}
  }
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<footer>Formative check — answers are scored in your browser. Nothing is submitted or stored anywhere. <a href="https://trbaker.github.io/question_widget/">Create your questions.</a></footer>

<script>
/* ---------- encode / decode (URL-safe, Unicode-safe) ---------- */
function encode(obj){
  const json = JSON.stringify(obj);
  return btoa(encodeURIComponent(json)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decode(str){
  try{
    const b = str.replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(decodeURIComponent(atob(b)));
  }catch(e){ return null; }
}
function esc(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// A decoded payload is only usable if it has a question and a usable array of answers.
function isValidQuestion(d){
  return d && typeof d === 'object'
    && typeof d.q === 'string' && d.q.trim().length
    && Array.isArray(d.o)
    && d.o.some(t => typeof t === 'string' && t.trim().length);
}

const app = document.getElementById('app');
const params = new URLSearchParams(location.search);

if (params.has('d')) {
  const data = decode(params.get('d'));
  if (isValidQuestion(data)) {
    try { renderStudent(data); }
    catch(e){ renderBadLink(); }
  } else {
    renderBadLink();
  }
} else {
  renderTeacher();
}

function renderBadLink(){
  app.innerHTML = `
  <div class="card">
    <p class="q-stem">This question link doesn’t look right</p>
    <p class="q-instruct" style="margin-bottom:0">The link may be incomplete or was changed after it was created. Ask whoever shared it for a fresh link, or build your own.</p>
    <div class="row" style="margin-top:16px">
      <a class="btn btn-ghost" href="https://trbaker.github.io/question_widget/" style="text-decoration:none">Create a question</a>
    </div>
  </div>`;
}

/* ===================== STUDENT MODE ===================== */
function renderStudent(d){
  const opts = d.o.map((text,i)=>({
                    text: typeof text === 'string' ? text : '',
                    fb: (d.f && typeof d.f[i] === 'string') ? d.f[i] : '',
                    correct: !!(d.c && d.c[i])
                  }))
                  .filter(o=>o.text && o.text.trim().length);
  const multi = opts.filter(o=>o.correct).length > 1;
  const inputType = multi ? 'checkbox' : 'radio';

  let html = '<div class="card">';
  html += `<p class="q-stem">${esc(d.q)}</p>`;
  html += `<p class="q-instruct">${multi ? 'Select all that apply.' : 'Choose one answer.'}</p>`;
  html += '<div id="choices">';
  opts.forEach((o,i)=>{
    html += `<label class="choice" data-i="${i}">
      <input type="${inputType}" name="ans" value="${i}">
      <span class="ctext">${esc(o.text)}</span>
    </label>`;
  });
  html += '</div>';
  html += '<div id="result"></div>';
  html += '<div class="row"><button class="btn" id="check">Check answer</button>'
        + '<button class="btn-ghost btn" id="retry" style="display:none">Try again</button></div>';
  html += '</div>';
  app.innerHTML = html;

  const choicesEl = document.getElementById('choices');
  const resultEl  = document.getElementById('result');
  const checkBtn  = document.getElementById('check');
  const retryBtn  = document.getElementById('retry');

  checkBtn.addEventListener('click', ()=>{
    const picked = [...choicesEl.querySelectorAll('input:checked')].map(el=>+el.value);
    if (!picked.length){
      resultEl.innerHTML = '<div class="result review">Pick an answer first, then check.</div>';
      return;
    }
    const correctIdx = opts.map((o,i)=>o.correct?i:-1).filter(i=>i>=0);
    const allCorrectPicked = correctIdx.every(i=>picked.includes(i));
    const noWrongPicked = picked.every(i=>opts[i].correct);
    const win = allCorrectPicked && noWrongPicked;

    choicesEl.querySelectorAll('.choice').forEach(label=>{
      const i = +label.dataset.i;
      const o = opts[i];
      const sel = picked.includes(i);
      label.classList.add('locked');
      label.querySelector('input').disabled = true;

      // Only the options the student selected reveal feedback.
      if (!sel) return;

      label.classList.add(o.correct ? 'is-correct' : 'is-wrong');
      const verdict = o.correct
        ? '<div class="verdict c">✓ Correct</div>'
        : '<div class="verdict w">✗ Not the best choice</div>';
      const fb = o.fb ? `<div class="fb">${esc(o.fb)}</div>` : '';
      const box = document.createElement('div');
      box.innerHTML = verdict + fb;
      label.querySelector('.ctext').appendChild(box);
    });

    resultEl.innerHTML = win
      ? '<div class="result win">Nice — that’s right! Read the notes below if you’d like.</div>'
      : '<div class="result review">Not quite yet. Look at the feedback under each choice and try again.</div>';

    checkBtn.style.display = 'none';
    retryBtn.style.display = '';
  });

  retryBtn.addEventListener('click', ()=> renderStudent(d));
}

/* ===================== TEACHER MODE ===================== */
function renderTeacher(){
  let html = `
  <h1>Question builder</h1>
  <p class="lede">Write a question, fill in up to four answers, mark which are correct, and add feedback for each. Then create a link to share or embed. Students get instant feedback — nothing is sent anywhere.</p>

  <div class="card">
    <label for="q">Question <span class="hint">— what students will read</span></label>
    <textarea id="q" placeholder="e.g. Which of these are mammals?"></textarea>
  </div>`;

  for (let i=0;i<4;i++){
    html += `
    <div class="opt">
      <div class="opt-head">
        <span class="tag">Answer ${i+1}</span>
        <label class="correct-toggle"><input type="checkbox" class="c" data-i="${i}"> Mark correct</label>
      </div>
      <input type="text" class="o" data-i="${i}" placeholder="${i<2?'Answer text':'Answer text (optional)'}">
      <p class="fb-label">Feedback shown after checking</p>
      <textarea class="f" data-i="${i}" placeholder="e.g. Yes — whales feed milk to their young."></textarea>
    </div>`;
  }

  html += `
  <div class="card">
    <div class="row">
      <button class="btn" id="make">Create share link</button>
      <button class="btn btn-ghost" id="preview">Preview as student</button>
    </div>
    <div id="err"></div>
    <div id="out"></div>
  </div>`;

  app.innerHTML = html;

  function gather(){
    const q = document.getElementById('q').value.trim();
    const o = [...document.querySelectorAll('.o')].map(el=>el.value.trim());
    const f = [...document.querySelectorAll('.f')].map(el=>el.value.trim());
    const c = [...document.querySelectorAll('.c')].map(el=>el.checked);
    return {q,o,f,c};
  }
  function validate(d){
    if (!d.q) return 'Add a question first.';
    const filled = d.o.map((t,i)=>({t,i})).filter(x=>x.t);
    if (filled.length < 2) return 'Add at least two answer choices.';
    const hasCorrect = filled.some(x=>d.c[x.i]);
    if (!hasCorrect) return 'Mark at least one answer as correct.';
    return null;
  }

  document.getElementById('err');
  const out = document.getElementById('out');
  const err = document.getElementById('err');

  document.getElementById('preview').addEventListener('click', ()=>{
    const d = gather();
    const problem = validate(d);
    err.innerHTML = problem ? `<div class="msg">${esc(problem)}</div>` : '';
    if (problem) return;
    // open the student view using a hash so we can return
    const url = location.origin + location.pathname + '?d=' + encode(d);
    window.open(url, '_blank');
  });

  document.getElementById('make').addEventListener('click', ()=>{
    const d = gather();
    const problem = validate(d);
    err.innerHTML = problem ? `<div class="msg">${esc(problem)}</div>` : '';
    out.innerHTML = '';
    if (problem) return;

    const url = location.origin + location.pathname + '?d=' + encode(d);
    const iframe = `<iframe src="${url}" width="100%" height="520" style="border:1px solid #ccc;border-radius:8px"></iframe>`;

    out.innerHTML = `
      <div class="share-out">
        <label>Share link <span class="hint">— paste into your LMS, send to students, or open directly</span></label>
        <textarea id="lnk" rows="3" readonly>${esc(url)}</textarea>
        <div class="row" style="margin-top:8px">
          <button class="btn btn-ghost" id="cpLink">Copy link</button>
          <a class="btn btn-ghost" href="${url}" target="_blank" style="text-decoration:none">Open it</a>
          <span class="copied" id="cp1" style="display:none">Copied!</span>
        </div>

        <label>Embed code <span class="hint">— for platforms that accept HTML / iframes</span></label>
        <textarea id="emb" rows="3" readonly>${esc(iframe)}</textarea>
        <div class="row" style="margin-top:8px">
          <button class="btn btn-ghost" id="cpEmb">Copy embed code</button>
          <span class="copied" id="cp2" style="display:none">Copied!</span>
        </div>
      </div>`;

    const copy=(area,flag)=>{ area.select(); document.execCommand('copy');
      flag.style.display=''; setTimeout(()=>flag.style.display='none',1600); };
    document.getElementById('cpLink').addEventListener('click',()=>copy(document.getElementById('lnk'),document.getElementById('cp1')));
    document.getElementById('cpEmb').addEventListener('click',()=>copy(document.getElementById('emb'),document.getElementById('cp2')));
  });
}
</script>
</body>
</html>
